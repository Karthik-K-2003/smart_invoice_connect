<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}{% endblock %}
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen">

    <!-- TOP BAR -->
    <header class="bg-white shadow-sm border-b">

        <div class="flex justify-between items-center px-8 py-4">

            <div class="flex items-center gap-4">

                <a href="{{ url_for('dashboard.dashboard') }}"
                   class="text-cyan-600 font-semibold hover:text-cyan-700">

                    ← Back to Dashboard

                </a>

            </div>

            <div class="bg-slate-100 px-4 py-2 rounded-xl">

                <span class="font-semibold">
                    👤 {{ session['user_name'] }}
                </span>

            </div>

        </div>

    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}

    {% if messages %}

    <div id="flash-container" class="fixed top-20 right-5 z-50 space-y-3">

        {% for category, message in messages %}

        <div class="
                    flash-message
                    px-5 py-3 rounded-xl shadow-lg text-white font-medium transition-all duration-500
                    {% if category == 'success' %}
                        bg-green-500
                    {% else %}
                        bg-red-500
                    {% endif %}
                ">

            {{ message }}

        </div>

        {% endfor %}

    </div>

    {% endif %}

    {% endwith %}

    <!-- MAIN CONTENT -->
    <main class="p-8">

        {% block content %}
        {% endblock %}

    </main>

    <script src="{{ url_for('static', filename='js/flash_messages.js') }}"></script>

</body>

</html>
