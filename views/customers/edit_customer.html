{% extends 'layouts/dashboard_base.html' %}

{% block title %}Edit Customer{% endblock %}

{% block page_title %}Edit Customer{% endblock %}

{% block content %}

<div class="bg-white p-6 rounded-xl shadow max-w-2xl">

    <h2 class="text-2xl font-bold mb-6">
        Edit Customer
    </h2>

    <form method="POST">

        <div class="space-y-4">

            <input type="text" name="customer_name" value="{{ customer['customer_name'] }}"
                class="w-full border rounded-lg px-4 py-3" required>

            <input type="text" name="phone" value="{{ customer['phone'] }}" class="w-full border rounded-lg px-4 py-3"
                required>

            <input type="email" name="email" value="{{ customer['email'] }}" class="w-full border rounded-lg px-4 py-3">

            <textarea name="address" class="w-full border rounded-lg px-4 py-3">{{ customer['address'] }}</textarea>

        </div>

        <div class="flex gap-3 mt-6">

            <a href="{{ url_for('customers.customers') }}" class="bg-gray-400 text-white px-5 py-2 rounded-lg">
                Cancel
            </a>

            <button type="submit" class="bg-cyan-500 text-white px-5 py-2 rounded-lg">
                Update Customer
            </button>

        </div>

    </form>

</div>

{% endblock %}
