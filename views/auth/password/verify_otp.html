{% extends 'layouts/base.html' %}

{% block title %}Verify OTP{% endblock %}

{% block content %}

<div
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-950 via-slate-900 to-cyan-900 px-6">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-10">

        <div class="text-center mb-8">

            <div class="text-6xl mb-4">
                🔐
            </div>

            <h2 class="text-4xl font-bold text-gray-800">
                Verify OTP
            </h2>

            <p class="text-gray-500 mt-3">
                Enter the OTP sent to your email
            </p>

        </div>

        <form method="POST" class="space-y-5">

            <div>

                <label class="block text-gray-700 mb-2 font-medium">
                    OTP Code
                </label>

                <input type="text" name="otp" maxlength="6" placeholder="Enter 6-digit OTP"
                    class="w-full px-4 py-3 text-center tracking-[10px] text-xl border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500"
                    required>

            </div>

            <button type="submit"
                class="w-full bg-cyan-500 hover:bg-cyan-600 text-white py-3 rounded-xl font-semibold shadow-lg transition duration-300">
                Verify OTP
            </button>

        </form>

    </div>

</div>

{% endblock %}
