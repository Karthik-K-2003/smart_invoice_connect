{% extends 'layouts/base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}

<div
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-950 via-slate-900 to-cyan-900 px-6">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-10">

        <div class="text-center mb-8">

            <div class="text-6xl mb-4">
                🔑
            </div>

            <h2 class="text-4xl font-bold text-gray-800">
                Reset Password
            </h2>

            <p class="text-gray-500 mt-3">
                Create your new password securely
            </p>

        </div>

        <form method="POST" class="space-y-5">

            <!-- PASSWORD -->
            <div>

                <label class="block text-gray-700 mb-2 font-medium">
                    New Password
                </label>

                <div class="relative">

                    <input type="password" id="password" name="password" placeholder="Enter new password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500"
                        required>

                    <button type="button" onclick="togglePassword('password', 'eyeIcon')" class="absolute right-4 top-3 text-xl">
                        <span id="eyeIcon">👁️</span>
                    </button>

                </div>

            </div>

            <!-- CONFIRM PASSWORD -->
            <div>

                <label class="block text-gray-700 mb-2 font-medium">
                    Confirm Password
                </label>

                <div class="relative">

                    <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm password"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500"
                        required>

                    <button type="button" onclick="togglePassword('confirmPassword', 'confirmEyeIcon')" class="absolute right-4 top-3 text-xl">
                        <span id="confirmEyeIcon">👁️</span>
                    </button>

                </div>

            </div>

            <button type="submit"
                class="w-full bg-cyan-500 hover:bg-cyan-600 text-white py-3 rounded-xl font-semibold shadow-lg transition duration-300">
                Reset Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
